<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoTabAnim — Admin</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#040e2a;--card:rgba(5,20,60,0.8);--cyan:#00B8FF;--cyan2:#00E5FF;
  --white:#fff;--muted:rgba(255,255,255,0.5);--border:rgba(0,184,255,0.2);
  --red:#FF4444;--green:#00C853;--radius:16px;
}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--white);min-height:100vh;}
body::before{
  content:"";position:fixed;inset:0;
  background:radial-gradient(ellipse 60% 40% at 20% 10%,rgba(0,80,255,0.15) 0%,transparent 70%),
             radial-gradient(ellipse 50% 35% at 80% 60%,rgba(0,180,255,0.1) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}

/* ── Login ── */
#loginScreen{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:var(--bg);z-index:100;
}
.login-box{
  background:rgba(5,20,60,0.9);border:1px solid var(--border);border-radius:24px;
  padding:40px 36px;width:340px;text-align:center;
  box-shadow:0 0 40px rgba(0,184,255,0.15);
}
.login-box h2{
  font-size:22px;font-weight:900;margin-bottom:6px;
  background:linear-gradient(90deg,var(--cyan),var(--cyan2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.login-box p{font-size:13px;color:var(--muted);margin-bottom:24px;}
.login-input{
  width:100%;height:46px;padding:0 14px;margin-bottom:12px;
  border:1px solid var(--border);border-radius:12px;
  font-size:15px;color:var(--white);background:rgba(0,184,255,0.04);
  outline:none;
}
.login-input:focus{border-color:var(--cyan);}
.btn-login{
  width:100%;height:46px;border:none;border-radius:12px;
  font-size:15px;font-weight:700;cursor:pointer;color:var(--white);
  background:linear-gradient(90deg,#0055FF,var(--cyan));
  box-shadow:0 0 20px rgba(0,184,255,0.3);
}
.login-error{font-size:13px;color:var(--red);margin-top:10px;min-height:18px;}

/* ── Main ── */
#mainScreen{display:none;position:relative;z-index:1;}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;
  background:rgba(4,14,42,0.85);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:10;
}
.topbar-brand{font-size:20px;font-weight:900;}
.topbar-brand span{
  background:linear-gradient(90deg,var(--cyan),var(--cyan2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.btn-logout{
  padding:7px 16px;border:1px solid var(--border);border-radius:10px;
  font-size:13px;font-weight:700;cursor:pointer;color:var(--muted);
  background:transparent;transition:color 0.2s,border-color 0.2s;
}
.btn-logout:hover{color:var(--white);border-color:var(--white);}

.container{max-width:900px;margin:0 auto;padding:28px 20px;}
.section-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;margin-top:32px;
}
.section-head h2{font-size:18px;font-weight:900;color:var(--cyan);}
.btn-add{
  display:flex;align-items:center;gap:6px;
  padding:8px 18px;border:none;border-radius:10px;
  font-size:13px;font-weight:700;cursor:pointer;color:var(--white);
  background:linear-gradient(90deg,#0055FF,var(--cyan));
  box-shadow:0 0 14px rgba(0,184,255,0.3);transition:opacity 0.2s;
}
.btn-add:hover{opacity:0.88;}

/* ── Product list ── */
.product-list{display:flex;flex-direction:column;gap:12px;}
.product-row{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 18px;display:grid;gap:10px;align-items:center;
  grid-template-columns:1fr auto;backdrop-filter:blur(8px);
}
.product-row:hover{border-color:rgba(0,184,255,0.4);}
.row-info{}
.row-title{font-size:15px;font-weight:800;color:var(--white);margin-bottom:3px;}
.row-meta{display:flex;gap:8px;flex-wrap:wrap;}
.tag{
  font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;
  background:rgba(0,184,255,0.08);border:1px solid var(--border);color:var(--cyan);
}
.tag.price{background:linear-gradient(90deg,#0055FF,var(--cyan));color:#fff;border:none;}
.tag.free{background:rgba(0,200,83,0.15);border-color:rgba(0,200,83,0.3);color:var(--green);}
.tag.new-tag{background:rgba(255,107,53,0.15);border-color:rgba(255,107,53,0.3);color:#FF6B35;}
.tag.no-video{background:rgba(255,68,68,0.15);border-color:rgba(255,68,68,0.3);color:var(--red);}
.row-video{font-size:11px;color:var(--muted);margin-top:4px;word-break:break-all;}
.row-actions{display:flex;gap:8px;}
.btn-edit,.btn-del{
  padding:7px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;
  border:1px solid var(--border);transition:all 0.18s;
}
.btn-edit{color:var(--cyan);background:rgba(0,184,255,0.06);}
.btn-edit:hover{background:rgba(0,184,255,0.15);border-color:var(--cyan);}
.btn-del{color:var(--red);background:rgba(255,68,68,0.06);}
.btn-del:hover{background:rgba(255,68,68,0.15);border-color:var(--red);}

/* ── Modal form ── */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(2,8,24,0.8);backdrop-filter:blur(8px);
  z-index:200;align-items:center;justify-content:center;padding:20px;overflow-y:auto;
}
.modal-overlay.open{display:flex;}
.modal-box{
  background:#071540;border-radius:24px;padding:30px 28px;
  max-width:560px;width:100%;border:1px solid var(--border);
  box-shadow:0 0 50px rgba(0,184,255,0.2);
  margin:auto;
}
.modal-title{
  font-size:20px;font-weight:900;margin-bottom:20px;
  background:linear-gradient(90deg,var(--cyan),var(--cyan2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group.full{grid-column:1/-1;}
.form-group label{font-size:12px;font-weight:700;color:var(--muted);}
.form-group input,.form-group select,.form-group textarea{
  padding:10px 12px;border:1px solid var(--border);border-radius:10px;
  font-size:13px;color:var(--white);background:rgba(0,184,255,0.04);outline:none;
  transition:border-color 0.2s;font-family:Arial,sans-serif;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--cyan);}
.form-group select option{background:#071540;}
.form-group textarea{height:70px;resize:vertical;line-height:1.5;}
.checkbox-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);}
.checkbox-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--cyan);}
.video-hint{
  font-size:11px;color:var(--muted);margin-top:4px;line-height:1.5;
  padding:8px 10px;background:rgba(0,184,255,0.04);border-radius:8px;
  border:1px solid rgba(0,184,255,0.1);
}
.modal-actions{display:flex;gap:10px;margin-top:20px;}
.btn-save{
  flex:1;height:44px;border:none;border-radius:12px;
  font-size:14px;font-weight:700;cursor:pointer;color:var(--white);
  background:linear-gradient(90deg,#0055FF,var(--cyan));
  box-shadow:0 0 16px rgba(0,184,255,0.3);
}
.btn-cancel{
  flex:0.5;height:44px;border:1px solid var(--border);border-radius:12px;
  font-size:14px;font-weight:700;cursor:pointer;color:var(--muted);background:transparent;
}
.btn-cancel:hover{color:var(--white);border-color:var(--white);}
.save-status{font-size:12px;color:var(--green);margin-top:8px;min-height:16px;text-align:center;}

/* ── Divider ── */
.divider{border:none;border-top:1px solid var(--border);margin:32px 0;}
</style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <div class="login-box">
    <h2>GoTabAnim Admin</h2>
    <p>Кіру үшін құпиясөз енгізіңіз</p>
    <input class="login-input" type="password" id="passInput" placeholder="Құпиясөз" onkeydown="if(event.key==='Enter')login()">
    <button class="btn-login" onclick="login()">Кіру</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- Main -->
<div id="mainScreen">
  <div class="topbar">
    <div class="topbar-brand">GoTab<span>Anim</span>.kz — Admin</div>
    <button class="btn-logout" onclick="logout()">Шығу</button>
  </div>

  <div class="container">

    <!-- Products -->
    <div class="section-head">
      <h2>Анимациялар дүкені</h2>
      <button class="btn-add" onclick="openForm('product', null)">+ Анимация қосу</button>
    </div>
    <div class="product-list" id="productList"></div>

    <hr class="divider">

    <!-- Combos -->
    <div class="section-head">
      <h2>Worksheet + Анимация (Комбо)</h2>
      <button class="btn-add" onclick="openForm('combo', null)">+ Комбо қосу</button>
    </div>
    <div class="product-list" id="comboList"></div>

  </div>
</div>

<!-- Product Form Modal -->
<div class="modal-overlay" id="formModal">
  <div class="modal-box">
    <div class="modal-title" id="formTitle">Анимация қосу</div>
    <div class="form-grid">
      <div class="form-group full">
        <label>Бейне URL (YouTube немесе mp4 сілтеме)</label>
        <input type="text" id="f_video" placeholder="https://youtube.com/shorts/... немесе https://...mp4">
        <div class="video-hint">
          💡 YouTube Shorts немесе видео URL-ін қойыңыз. Жергілікті файл жұмыс істемейді.<br>
          YouTube-ке жүктеу: Studio → Жүктеу → Unlisted → URL-ін көшіру
        </div>
      </div>
      <div class="form-group">
        <label>Атауы (Қазақша)</label>
        <input type="text" id="f_title_kk" placeholder="Квадраттық функция">
      </div>
      <div class="form-group">
        <label>Атауы (Орысша)</label>
        <input type="text" id="f_title_ru" placeholder="Квадратная функция">
      </div>
      <div class="form-group full">
        <label>Сипаттама (Қазақша)</label>
        <textarea id="f_desc_kk" placeholder="Анимация туралы..."></textarea>
      </div>
      <div class="form-group full">
        <label>Сипаттама (Орысша)</label>
        <textarea id="f_desc_ru" placeholder="Описание анимации..."></textarea>
      </div>
      <div class="form-group" id="topicGroup">
        <label>Тақырып</label>
        <select id="f_topic">
          <option value="alg">Алгебра</option>
          <option value="geo">Геометрия</option>
          <option value="trig">Тригонометрия</option>
          <option value="log">Логарифм</option>
          <option value="num">Сандар теориясы</option>
          <option value="calc">Есептеу</option>
        </select>
      </div>
      <div class="form-group">
        <label>Бағасы</label>
        <input type="text" id="f_price" placeholder="990 ₸">
      </div>
      <div class="form-group full" id="badgesGroup">
        <label>Белгілер</label>
        <div style="display:flex;gap:20px;margin-top:4px;">
          <label class="checkbox-row"><input type="checkbox" id="f_isNew"> Жаңа (New badge)</label>
          <label class="checkbox-row"><input type="checkbox" id="f_free"> Тегін (Free badge)</label>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeForm()">Болдырмау</button>
      <button class="btn-save" onclick="saveForm()">Сақтау</button>
    </div>
    <div class="save-status" id="saveStatus"></div>
  </div>
</div>

<script>
const PASS_KEY = 'gotabanim_admin_pass';
let adminPass = '';
let editingType = null;
let editingId = null;

// ── Auth ──
function login() {
  const p = document.getElementById('passInput').value;
  fetch('/api/products', { headers: { 'x-admin-pass': p } })
    .then(r => {
      if (r.ok) {
        adminPass = p;
        sessionStorage.setItem(PASS_KEY, p);
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainScreen').style.display = 'block';
        loadData();
      } else {
        document.getElementById('loginError').textContent = 'Құпиясөз қате';
      }
    }).catch(() => document.getElementById('loginError').textContent = 'Қосылу қатесі');
}
function logout() {
  sessionStorage.removeItem(PASS_KEY);
  adminPass = '';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('mainScreen').style.display = 'none';
}
window.addEventListener('load', () => {
  const saved = sessionStorage.getItem(PASS_KEY);
  if (saved) {
    document.getElementById('passInput').value = saved;
    adminPass = saved;
    login();
  }
});

// ── Load & render ──
function loadData() {
  fetch('/api/products')
    .then(r => r.json())
    .then(data => {
      renderList('productList', data.products, 'product');
      renderList('comboList', data.combos, 'combo');
    });
}

function renderList(containerId, items, type) {
  const el = document.getElementById(containerId);
  if (!items.length) {
    el.innerHTML = `<div style="color:var(--muted);font-size:14px;padding:16px 0;">Әзірге жоқ. Жоғарыдағы түймемен қосыңыз.</div>`;
    return;
  }
  el.innerHTML = items.map(p => {
    const hasVideo = p.video && p.video.trim();
    const tags = [
      `<span class="tag price">${p.price}</span>`,
      p.topic ? `<span class="tag">${p.topic}</span>` : '',
      p.isNew ? `<span class="tag new-tag">Жаңа</span>` : '',
      p.free ? `<span class="tag free">Тегін</span>` : '',
      !hasVideo ? `<span class="tag no-video">⚠ Бейне жоқ</span>` : '',
    ].filter(Boolean).join('');
    const videoText = hasVideo
      ? `<div class="row-video">🎬 ${p.video.substring(0,60)}${p.video.length>60?'...':''}</div>`
      : `<div class="row-video" style="color:var(--red);">Бейне URL жоқ — қосу керек</div>`;
    return `<div class="product-row">
      <div class="row-info">
        <div class="row-title">${p.title_kk || p.title_ru || '—'}</div>
        <div class="row-meta">${tags}</div>
        ${videoText}
      </div>
      <div class="row-actions">
        <button class="btn-edit" onclick="openForm('${type}', ${p.id})">Өзгерту</button>
        <button class="btn-del" onclick="deleteItem('${type}', ${p.id})">Жою</button>
      </div>
    </div>`;
  }).join('');
}

// ── Form ──
function openForm(type, id) {
  editingType = type;
  editingId = id;
  const isCombo = type === 'combo';

  document.getElementById('topicGroup').style.display = isCombo ? 'none' : '';
  document.getElementById('badgesGroup').style.display = isCombo ? 'none' : '';
  document.getElementById('formTitle').textContent = id
    ? (isCombo ? 'Комбоны өзгерту' : 'Анимацияны өзгерту')
    : (isCombo ? 'Комбо қосу' : 'Анимация қосу');

  clearForm();
  if (id) {
    fetch('/api/products').then(r => r.json()).then(data => {
      const arr = isCombo ? data.combos : data.products;
      const item = arr.find(p => p.id == id);
      if (!item) return;
      document.getElementById('f_video').value = item.video || '';
      document.getElementById('f_title_kk').value = item.title_kk || '';
      document.getElementById('f_title_ru').value = item.title_ru || '';
      document.getElementById('f_desc_kk').value = item.desc_kk || '';
      document.getElementById('f_desc_ru').value = item.desc_ru || '';
      document.getElementById('f_price').value = item.price || '';
      if (!isCombo) {
        document.getElementById('f_topic').value = item.topic || 'alg';
        document.getElementById('f_isNew').checked = !!item.isNew;
        document.getElementById('f_free').checked = !!item.free;
      }
    });
  }
  document.getElementById('saveStatus').textContent = '';
  document.getElementById('formModal').classList.add('open');
}

function closeForm() {
  document.getElementById('formModal').classList.remove('open');
}

function clearForm() {
  ['f_video','f_title_kk','f_title_ru','f_desc_kk','f_desc_ru','f_price'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f_topic').value = 'alg';
  document.getElementById('f_isNew').checked = false;
  document.getElementById('f_free').checked = false;
}

function saveForm() {
  const isCombo = editingType === 'combo';
  const body = {
    video:    document.getElementById('f_video').value.trim(),
    title_kk: document.getElementById('f_title_kk').value.trim(),
    title_ru: document.getElementById('f_title_ru').value.trim(),
    desc_kk:  document.getElementById('f_desc_kk').value.trim(),
    desc_ru:  document.getElementById('f_desc_ru').value.trim(),
    price:    document.getElementById('f_price').value.trim(),
  };
  if (!isCombo) {
    body.topic  = document.getElementById('f_topic').value;
    body.isNew  = document.getElementById('f_isNew').checked;
    body.free   = document.getElementById('f_free').checked;
  }

  const endpoint = isCombo ? '/api/combos' : '/api/products';
  const url = editingId ? `${endpoint}/${editingId}` : endpoint;
  const method = editingId ? 'PUT' : 'POST';

  fetch(url, {
    method,
    headers: { 'Content-Type': 'application/json', 'x-admin-pass': adminPass },
    body: JSON.stringify(body)
  }).then(r => r.json()).then(result => {
    if (result.error) {
      document.getElementById('saveStatus').style.color = 'var(--red)';
      document.getElementById('saveStatus').textContent = result.error;
    } else {
      document.getElementById('saveStatus').style.color = 'var(--green)';
      document.getElementById('saveStatus').textContent = '✓ Сақталды';
      setTimeout(() => { closeForm(); loadData(); }, 800);
    }
  });
}

function deleteItem(type, id) {
  if (!confirm('Жою растайсыз ба?')) return;
  const endpoint = type === 'combo' ? '/api/combos' : '/api/products';
  fetch(`${endpoint}/${id}`, {
    method: 'DELETE',
    headers: { 'x-admin-pass': adminPass }
  }).then(() => loadData());
}

document.getElementById('formModal').addEventListener('click', function(e) {
  if (e.target === this) closeForm();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeForm();
});
</script>
</body>
</html>
